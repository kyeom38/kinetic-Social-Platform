<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>社員情報の編集</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        body { background-color: #f4f6f9; margin: 0; }
        .main-content { padding: 32px 24px; }
        .card { border-radius: 12px; border: none; }
        @media (max-width: 991.98px) {
            .main-content { padding: 16px 12px; }
        }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: nav('admin')}"></th:block>

<div class="main-content">
<div class="container" style="max-width: 520px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h4 class="mb-0">社員情報の編集</h4>
        <a href="/admin/users" class="text-muted text-decoration-none small">← 社員管理へ</a>
    </div>
    <p class="text-muted small mb-4">
        管理者が編集できる項目のみ表示しています。<br>
        プロフィールの詳細（自己紹介など）は本人が編集します。
    </p>

    <!-- 保存・リセット成功メッセージ -->
    <div th:if="${saveSuccess}" class="alert alert-success py-2 small mb-3" th:text="${saveSuccess}"></div>
    <div th:if="${resetSuccess}" class="alert alert-success py-2 small mb-3" th:text="${resetSuccess}"></div>

    <div class="card shadow-sm p-4">
        <form th:action="@{/admin/users/{id}/edit(id=${user.id})}" th:object="${user}" method="post">

            <div class="mb-3">
                <label class="form-label">名前</label>
                <input type="text" class="form-control" th:field="*{name}">
            </div>

            <div class="mb-3">
                <label class="form-label">社員番号</label>
                <input type="text" class="form-control" th:field="*{employeeId}" placeholder="例: EMP-001">
            </div>

            <div class="mb-3">
                <label class="form-label">部署</label>
                <input type="text" class="form-control" th:field="*{department}" list="dept-list" placeholder="例: エンジニアリング部">
                <datalist id="dept-list">
                    <option th:each="dept : ${departments}" th:value="${dept}"></option>
                </datalist>
            </div>

            <div class="mb-3">
                <label class="form-label">役職</label>
                <input type="text" class="form-control" th:field="*{jobTitle}" list="title-list" placeholder="例: 部長">
                <datalist id="title-list">
                    <option th:each="jt : ${jobTitles}" th:value="${jt}"></option>
                </datalist>
            </div>

            <div class="mb-3">
                <label class="form-label">生年月日</label>
                <input type="date" class="form-control" th:field="*{birthDate}">
            </div>

            <div class="mb-4">
                <label class="form-label">権限</label>
                <select class="form-select" th:field="*{role}">
                    <option value="USER">社員</option>
                    <option value="ADMIN">管理者</option>
                </select>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="/admin/users" class="btn btn-outline-secondary btn-sm">キャンセル</a>
                <button type="submit" class="btn btn-primary btn-sm">保存する</button>
            </div>
        </form>
    </div>

    <!-- パスワードリセット -->
    <div class="card shadow-sm p-4 mt-3">
        <h6 class="fw-bold mb-3">🔑 パスワードリセット</h6>
        <form th:action="@{/admin/users/{id}/reset-password(id=${user.id})}" method="post">
            <div class="mb-3">
                <label class="form-label small">新しいパスワード</label>
                <input type="password" class="form-control form-control-sm" name="newPassword"
                       placeholder="新しいパスワードを入力" required autocomplete="new-password">
                <div class="form-text">設定後、本人に別途通知してください。</div>
            </div>
            <div class="text-end">
                <button type="submit" class="btn btn-outline-warning btn-sm"
                        onclick="return confirm('パスワードをリセットしますか？')">リセットする</button>
            </div>
        </form>
    </div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
setTimeout(() => document.querySelectorAll('.alert').forEach(el => {
    el.style.transition = 'opacity 0.5s'; el.style.opacity = '0';
    setTimeout(() => el.remove(), 500);
}), 4000);
</script>
</body>
</html>
