<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新規アカウント作成</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        body { background-color: #f4f6f9; margin: 0; }
        .main-content { padding: 32px 24px; }
        .card { border-radius: 12px; border: none; }
        @media (max-width: 991.98px) {
            .main-content { padding: 16px 12px; }
        }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: nav('admin')}"></th:block>

<div class="main-content">
<div class="container" style="max-width: 600px;">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a href="/admin/users" class="text-muted text-decoration-none">← ユーザー管理</a>
    </div>
    <h4 class="mb-1">新規アカウント作成</h4>
    <p class="text-muted small mb-4">社員のアカウントを発行します。初期パスワードは本人に別途伝えてください。</p>

    <div th:if="${createError}" class="alert alert-danger py-2 small mb-3" th:text="${createError}"></div>

    <div class="card shadow-sm p-4">
        <form th:action="@{/admin/users}" th:object="${user}" method="post">

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">名前 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">社員ID <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{employeeId}" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">メールアドレス <span class="text-danger">*</span></label>
                <input type="email" class="form-control" th:field="*{email}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">初期パスワード <span class="text-danger">*</span></label>
                <input type="password" class="form-control" th:field="*{password}" required minlength="8" placeholder="8文字以上">
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">部署</label>
                    <input type="text" class="form-control" th:field="*{department}" list="dept-list" placeholder="例: エンジニアリング部">
                    <datalist id="dept-list">
                        <option th:each="dept : ${departments}" th:value="${dept}"></option>
                    </datalist>
                </div>
                <div class="col-md-6">
                    <label class="form-label">役職 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{jobTitle}" list="title-list" required placeholder="例: 一般社員">
                    <datalist id="title-list">
                        <option th:each="jt : ${jobTitles}" th:value="${jt}"></option>
                    </datalist>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">生年月日 <span class="text-danger">*</span></label>
                <input type="date" class="form-control" th:field="*{birthDate}" required>
            </div>

            <div class="mb-4">
                <label class="form-label">権限 <span class="text-danger">*</span></label>
                <select class="form-select" th:field="*{role}" required>
                    <option value="USER">社員</option>
                    <option value="ADMIN">管理者</option>
                </select>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="/admin/users" class="btn btn-outline-secondary">キャンセル</a>
                <button type="submit" class="btn btn-primary">アカウントを作成</button>
            </div>
        </form>
    </div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
