<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>パスワード変更</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        body { background-color: #f4f6f9; margin: 0; }
        .card { border-radius: 12px; border: none; }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: nav('mypage')}"></th:block>

<div class="main-content">
<div class="container py-4 py-md-5" style="max-width: 480px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h4 class="mb-0">パスワード変更</h4>
        <a th:if="${!forced}" th:href="@{/users/{id}(id=${userId})}" class="text-muted text-decoration-none small">← プロフィールへ</a>
    </div>

    <div th:if="${forced}" class="alert alert-warning py-2 small mb-3">
        管理者によって初期パスワードが設定されています。セキュリティのため今すぐ変更してください。
    </div>
    <div th:if="${error}" class="alert alert-danger py-2 small mb-3" th:text="${error}"></div>

    <div class="card shadow-sm p-4">
        <form th:action="@{/users/{id}/password(id=${userId})}" method="post">
            <input th:if="${forced}" type="hidden" name="forced" value="true">
            <div class="mb-3">
                <label class="form-label">現在のパスワード</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="currentPassword" name="currentPassword" required autocomplete="current-password">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePw('currentPassword', this)">👁</button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">新しいパスワード</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="newPassword" name="newPassword"
                           required minlength="8" autocomplete="new-password">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePw('newPassword', this)">👁</button>
                </div>
                <div class="form-text">8文字以上で設定してください</div>
            </div>
            <div class="mb-4">
                <label class="form-label">新しいパスワード（確認）</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           required autocomplete="new-password">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePw('confirmPassword', this)">👁</button>
                </div>
                <div id="matchError" class="text-danger small mt-1" style="display:none;">パスワードが一致しません</div>
            </div>
            <div class="d-flex justify-content-end gap-2">
                <a th:href="@{/users/{id}(id=${userId})}" class="btn btn-outline-secondary btn-sm">キャンセル</a>
                <button type="submit" class="btn btn-primary btn-sm">変更する</button>
            </div>
        </form>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('confirmPassword').addEventListener('input', function() {
    const match = this.value === document.getElementById('newPassword').value;
    document.getElementById('matchError').style.display = match ? 'none' : 'block';
    this.setCustomValidity(match ? '' : 'パスワードが一致しません');
});
function togglePw(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
</script>
</body>
</html>
