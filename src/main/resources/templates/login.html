<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン - Kinetic Social</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .login-card { max-width: 420px; margin: 100px auto; border-radius: 16px; border: none; box-shadow: 0 2px 16px rgba(0,0,0,0.10); }
        .login-title { font-weight: 700; font-size: 1.5rem; }
        .btn-primary { background: #3d6bcc; border-color: #3d6bcc; }
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card p-5">
        <h4 class="login-title mb-1 text-center">Kinetic Social</h4>
        <p class="text-muted text-center small mb-4">社内ポータルにログイン</p>

        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            メールアドレスまたはパスワードが正しくありません。
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
            ログアウトしました。
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">メールアドレス</label>
                <input type="email" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">パスワード</label>
                <div class="input-group">
                    <input type="password" name="password" id="loginPassword" class="form-control" required>
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePw('loginPassword', this)">👁</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">ログイン</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
</script>
</body>
</html>
