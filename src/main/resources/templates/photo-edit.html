<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>プロフィールアイコンの変更</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        body { background-color: #f4f6f9; margin: 0; }
        .current-avatar { width: 100px; height: 100px; border-radius: 50%; background: #3d6bcc;
                          display: flex; align-items: center; justify-content: center;
                          font-size: 2.8rem; color: white; font-weight: 700; }
        .current-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
        .icon-group-label { font-size: 0.72rem; font-weight: 700; color: #aaa;
                            letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
        .icon-btn { width: 56px; height: 56px; border-radius: 12px; border: 2px solid #e8eaf0;
                    background: white; font-size: 1.8rem; cursor: pointer; display: flex;
                    align-items: center; justify-content: center; transition: all 0.15s; }
        .icon-btn:hover { border-color: #3d6bcc; background: #eef2fb; transform: scale(1.1); }
        .icon-btn.selected { border-color: #3d6bcc; background: #eef2fb;
                             box-shadow: 0 0 0 3px rgba(61,107,204,0.25); }
        .preview-box { width: 80px; height: 80px; border-radius: 50%; background: #3d6bcc;
                       display: flex; align-items: center; justify-content: center;
                       font-size: 2.2rem; margin: 0 auto; transition: all 0.2s; }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: nav('mypage')}"></th:block>

<div class="main-content">
<div class="container py-5" style="max-width: 560px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h4 class="mb-0">アイコンを選択</h4>
        <a th:href="@{/users/{id}(id=${user.id})}" class="text-muted text-decoration-none small">← 戻る</a>
    </div>

    <div class="card shadow-sm p-4">

        <!-- 現在のアイコン -->
        <div class="text-center mb-4">
            <div th:if="${user.profileImageUrl == null}" class="current-avatar mx-auto"
                 th:text="${user.name != null and !#strings.isEmpty(user.name) ? #strings.substring(user.name,0,1) : '?'}"></div>
            <div th:if="${user.profileImageUrl != null and !#strings.startsWith(user.profileImageUrl, '/')}"
                 class="current-avatar mx-auto" th:text="${user.profileImageUrl}"></div>
            <img th:if="${user.profileImageUrl != null and #strings.startsWith(user.profileImageUrl, '/')}"
                 th:src="${user.profileImageUrl}" class="current-img mx-auto d-block">
            <p class="text-muted small mt-2 mb-0">現在のアイコン</p>
        </div>

        <!-- 選択プレビュー -->
        <div class="text-center mb-4" id="previewArea" style="display:none;">
            <div class="preview-box" id="previewIcon"></div>
            <p class="text-muted small mt-2 mb-0">選択中のアイコン</p>
        </div>

        <!-- アイコン選択グリッド -->
        <form th:action="@{/users/{id}/photo(id=${user.id})}" method="post" id="iconForm">
            <input type="hidden" name="icon" id="selectedIcon">

            <div th:each="group : ${iconGroups}" class="mb-4">
                <div class="icon-group-label" th:text="${group.key}"></div>
                <div class="d-flex flex-wrap gap-2">
                    <button type="button" class="icon-btn"
                            th:each="ic : ${group.value}"
                            th:text="${ic}"
                            th:data-icon="${ic}"
                            th:classappend="${user.profileImageUrl == ic} ? ' selected'"
                            onclick="selectIcon(this)"></button>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-3">
                <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-outline-secondary">キャンセル</a>
                <button type="submit" class="btn btn-primary" id="saveBtn" disabled>このアイコンに変更</button>
            </div>
        </form>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function selectIcon(btn) {
    document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const icon = btn.dataset.icon;
    document.getElementById('selectedIcon').value = icon;
    document.getElementById('previewIcon').textContent = icon;
    document.getElementById('previewArea').style.display = 'block';
    document.getElementById('saveBtn').disabled = false;
}
</script>
</body>
</html>
