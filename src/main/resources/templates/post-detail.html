<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${post.title}">投稿詳細</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <style>
        body { background-color: #f4f6f9; margin: 0; }
        .card { border-radius: 12px; border: none; }
        .category-tag { background: #e8f0fe; color: #3d6bcc; border-radius: 20px; padding: 3px 12px; font-size: 0.85rem; }
        .author-avatar { width: 40px; height: 40px; border-radius: 50%; background: #aaa; display: flex; align-items: center; justify-content: center; color: white; font-size: 1rem; overflow: hidden; flex-shrink: 0; }
        .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: #3d6bcc; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.8rem; flex-shrink: 0; overflow: hidden; }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .comment-deleted { color: #aaa; font-style: italic; }
        .reply-indent { margin-left: 40px; border-left: 2px solid #e8eaf0; padding-left: 16px; }
        .vote-btn { min-width: 90px; }
        .vote-btn.active-yes      { background: #198754; color: white; border-color: #198754; }
        .vote-btn.active-no       { background: #dc3545; color: white; border-color: #dc3545; }
        .vote-btn.active-undecided { background: #6c757d; color: white; border-color: #6c757d; }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: nav('posts')}"></th:block>

<div class="main-content">
<div class="container py-4 py-md-5" style="max-width: 800px;">
    <a href="/posts" class="text-muted text-decoration-none mb-4 d-block">← 一覧へ戻る</a>

    <div class="card shadow-sm p-4 mb-4">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <span class="category-tag d-inline-block" th:text="${post.category}"></span>
            <button id="copyLinkBtn" class="btn btn-sm btn-outline-secondary" onclick="copyPostLink()" title="リンクをコピー">
                🔗 リンクをコピー
            </button>
        </div>
        <h3 class="fw-bold mb-3" th:text="${post.title}"></h3>

        <div class="d-flex align-items-center mb-3 flex-wrap gap-2">
            <div class="author-avatar me-2">
                <img th:if="${post.authorProfileImageUrl != null and #strings.startsWith(post.authorProfileImageUrl, '/')}"
                     th:src="${post.authorProfileImageUrl}" alt="">
                <span th:if="${post.authorProfileImageUrl != null and !#strings.startsWith(post.authorProfileImageUrl, '/')}"
                      th:text="${post.authorProfileImageUrl}"></span>
                <span th:if="${post.authorProfileImageUrl == null}"
                      th:text="${post.authorName != null and !#strings.isEmpty(post.authorName)} ? ${#strings.substring(post.authorName,0,1)} : '?'"></span>
            </div>
            <div>
                <div class="fw-bold small" th:text="${post.authorName ?: '匿名'}"></div>
                <div class="text-muted small">
                    <span th:text="${#temporals.format(post.createdAt,'yyyy年MM月dd日')}"></span>
                    <span th:if="${post.updatedAt != null}" class="ms-1" style="font-size:0.78rem;">
                        （<span th:text="${#temporals.format(post.updatedAt,'MM月dd日')}"></span> に更新）
                    </span>
                </div>
            </div>
            <span th:if="${isAdmin}" class="ms-auto text-muted small">👁 <span th:text="${post.viewCount}"></span> 閲覧</span>
            <a th:if="${currentUserId != null and (isAdmin or currentUserId == post.authorId)}"
               th:href="@{/posts/{id}/edit(id=${post.id})}"
               class="btn btn-sm btn-outline-secondary ms-2">編集</a>
            <form th:if="${currentUserId != null and (isAdmin or currentUserId == post.authorId)}"
                  th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="d-inline ms-1">
                <button type="submit" class="btn btn-sm btn-outline-danger"
                        onclick="return confirm('この投稿を削除しますか？')">削除</button>
            </form>
        </div>

        <!-- イベント情報 -->
        <div th:if="${post.eventDate != null}" class="alert alert-info py-2 small mb-3">
            🗓 実施日: <strong th:text="${#temporals.format(post.eventDate,'yyyy年MM月dd日')}"></strong>
            <span th:if="${post.capacity != null}"> ／ 定員: <strong th:text="${post.capacity}"></strong>名</span>
            <span th:if="${post.location != null}"> ／ 場所: <strong th:text="${post.location}"></strong></span>
        </div>

        <div th:if="${post.deadline != null}" class="text-muted small mb-3">
            📋 募集締め切り：<span th:text="${#temporals.format(post.deadline,'yyyy年MM月dd日')}"></span>
        </div>

        <hr>
        <div class="mt-3" style="white-space: pre-wrap;" th:text="${post.content}"></div>
    </div>

    <!-- 参加投票 -->
    <div th:if="${post.eventDate != null}" class="card shadow-sm p-4 mb-4">
        <h6 class="fw-bold mb-3">参加の意思表示</h6>
        <div class="d-flex align-items-center gap-2 gap-md-3 mb-3 flex-wrap">
            <form th:action="@{/posts/{id}/vote(id=${post.id})}" method="post">
                <input type="hidden" name="voteType" value="attending">
                <button type="submit"
                        th:classappend="${post.myVote == true} ? 'active-yes' : ''"
                        class="btn btn-outline-success vote-btn">
                    ✅ 参加<span th:if="${post.myVote == true}">（選択中）</span> (<span th:text="${post.attendingCount}"></span>)
                </button>
            </form>
            <form th:action="@{/posts/{id}/vote(id=${post.id})}" method="post">
                <input type="hidden" name="voteType" value="absent">
                <button type="submit"
                        th:classappend="${post.myVote == false} ? 'active-no' : ''"
                        class="btn btn-outline-danger vote-btn">
                    ❌ 不参加<span th:if="${post.myVote == false}">（選択中）</span> (<span th:text="${post.notAttendingCount}"></span>)
                </button>
            </form>
            <form th:action="@{/posts/{id}/vote(id=${post.id})}" method="post">
                <input type="hidden" name="voteType" value="undecided">
                <button type="submit"
                        th:classappend="${post.myVoteUndecided} ? 'active-undecided' : ''"
                        class="btn btn-outline-secondary vote-btn">
                    🤔 未定<span th:if="${post.myVoteUndecided}">（選択中）</span> (<span th:text="${post.undecidedCount}"></span>)
                </button>
            </form>
        </div>
        <!-- 参加者一覧 -->
        <div th:if="${!#lists.isEmpty(post.attendeeNames)}" class="mb-2">
            <div class="small text-success fw-bold mb-1">✅ 参加者</div>
            <div class="d-flex flex-wrap gap-1">
                <span th:each="name : ${post.attendeeNames}"
                      class="badge rounded-pill"
                      style="background:#d1fae5;color:#065f46;font-weight:500;"
                      th:text="${name}"></span>
            </div>
        </div>
        <div th:if="${!#lists.isEmpty(post.absenteeNames)}" class="mb-2">
            <div class="small text-danger fw-bold mb-1">❌ 不参加者</div>
            <div class="d-flex flex-wrap gap-1">
                <span th:each="name : ${post.absenteeNames}"
                      class="badge rounded-pill"
                      style="background:#fee2e2;color:#991b1b;font-weight:500;"
                      th:text="${name}"></span>
            </div>
        </div>
        <div th:if="${!#lists.isEmpty(post.undecidedNames)}" class="mb-1">
            <div class="small text-muted fw-bold mb-1">🤔 未定</div>
            <div class="d-flex flex-wrap gap-1">
                <span th:each="name : ${post.undecidedNames}"
                      class="badge rounded-pill"
                      style="background:#f0f0f0;color:#555;font-weight:500;"
                      th:text="${name}"></span>
            </div>
        </div>
    </div>

    <!-- コメント -->
    <div class="card shadow-sm p-4" id="comments">
        <h6 class="fw-bold mb-4">コメント (<span th:text="${post.commentCount}"></span>)</h6>

        <div th:each="c : ${comments}" class="mb-4">
            <!-- トップレベルコメント -->
            <div class="d-flex gap-3">
                <div class="comment-avatar">
                    <img th:if="${c.authorProfileImageUrl != null and #strings.startsWith(c.authorProfileImageUrl, '/')}"
                         th:src="${c.authorProfileImageUrl}" alt="">
                    <span th:if="${c.authorProfileImageUrl != null and !#strings.startsWith(c.authorProfileImageUrl, '/')}"
                          th:text="${c.authorProfileImageUrl}"></span>
                    <span th:if="${c.authorProfileImageUrl == null}" th:text="${c.authorInitial}"></span>
                </div>
                <div class="flex-grow-1">
                    <div class="d-flex align-items-center gap-2 mb-1 flex-wrap">
                        <span class="fw-bold small" th:text="${c.authorName}"></span>
                        <span class="text-muted" style="font-size:0.75rem;" th:text="${#temporals.format(c.createdAt,'MM/dd HH:mm')}"></span>
                        <!-- 削除ボタン: 本人 or 管理者 -->
                        <form th:if="${!c.deleted and currentUserId != null and (isAdmin or currentUserId == c.authorId)}"
                              th:action="@{/comments/{id}/delete(id=${c.id})}" method="post" class="ms-auto">
                            <input type="hidden" name="postId" th:value="${post.id}">
                            <button type="submit" class="btn btn-link btn-sm text-danger p-0"
                                    onclick="return confirm('このコメントを削除しますか？')">削除</button>
                        </form>
                    </div>
                    <div class="small" th:classappend="${c.deleted} ? 'comment-deleted' : ''"
                         style="white-space: pre-wrap;" th:text="${c.content}"></div>
                    <!-- 返信ボタン（削除されていない場合のみ） -->
                    <button th:if="${!c.deleted}" class="btn btn-link btn-sm text-muted p-0 mt-1"
                            style="font-size:0.78rem;"
                            th:id="|reply-btn-${c.id}|"
                            th:onclick="|toggleReply('reply-form-' + ${c.id}, 'reply-btn-' + ${c.id})|">
                        返信 ▾
                    </button>
                    <!-- 返信フォーム（初期非表示） -->
                    <form th:if="${!c.deleted}" th:id="|reply-form-${c.id}|" class="d-none mt-2"
                          th:action="@{/posts/{id}/comments(id=${post.id})}" method="post">
                        <input type="hidden" name="parentId" th:value="${c.id}">
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" name="content"
                                   placeholder="返信を入力..." required>
                            <button type="submit" class="btn btn-primary">送信</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 返信コメント -->
            <div th:if="${!#lists.isEmpty(c.replies)}" class="reply-indent mt-3">
                <div th:each="r : ${c.replies}" class="d-flex gap-3 mb-3">
                    <div class="comment-avatar">
                        <img th:if="${r.authorProfileImageUrl != null and #strings.startsWith(r.authorProfileImageUrl, '/')}"
                             th:src="${r.authorProfileImageUrl}" alt="">
                        <span th:if="${r.authorProfileImageUrl != null and !#strings.startsWith(r.authorProfileImageUrl, '/')}"
                              th:text="${r.authorProfileImageUrl}"></span>
                        <span th:if="${r.authorProfileImageUrl == null}" th:text="${r.authorInitial}"></span>
                    </div>
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center gap-2 mb-1 flex-wrap">
                            <span class="fw-bold small" th:text="${r.authorName}"></span>
                            <span class="text-muted" style="font-size:0.75rem;" th:text="${#temporals.format(r.createdAt,'MM/dd HH:mm')}"></span>
                            <form th:if="${!r.deleted and currentUserId != null and (isAdmin or currentUserId == r.authorId)}"
                                  th:action="@{/comments/{id}/delete(id=${r.id})}" method="post" class="ms-auto">
                                <input type="hidden" name="postId" th:value="${post.id}">
                                <button type="submit" class="btn btn-link btn-sm text-danger p-0"
                                        onclick="return confirm('このコメントを削除しますか？')">削除</button>
                            </form>
                        </div>
                        <div class="small" th:classappend="${r.deleted} ? 'comment-deleted' : ''"
                             style="white-space: pre-wrap;" th:text="${r.content}"></div>
                    </div>
                </div>
            </div>
        </div>

        <hr th:if="${!#lists.isEmpty(comments)}">

        <form th:action="@{/posts/{id}/comments(id=${post.id})}" method="post" class="mt-3">
            <div class="mb-2">
                <textarea class="form-control" name="content" rows="3"
                          placeholder="コメントを入力..." required></textarea>
            </div>
            <div class="text-end">
                <button type="submit" class="btn btn-primary btn-sm">送信</button>
            </div>
        </form>
    </div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleReply(formId, btnId) {
    const form = document.getElementById(formId);
    const btn  = document.getElementById(btnId);
    const isOpen = !form.classList.contains('d-none');
    form.classList.toggle('d-none');
    btn.textContent = isOpen ? '返信 ▾' : '閉じる ▴';
    if (!isOpen) {
        form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        form.querySelector('input')?.focus();
    }
}
function copyPostLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('copyLinkBtn');
        const orig = btn.textContent;
        btn.textContent = '✅ コピーしました';
        setTimeout(() => btn.textContent = orig, 2000);
    });
}
</script>
</body>
</html>
